services:
  - type: web
    name: cfr-rates-dashboard
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npx vite build
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: dashboard-data
      mountPath: /opt/render/data
      sizeGB: 1
    envVars:
      - key: FRED_API_KEY
        value: 76c17144c6d9d52f878151707b847334
      - key: PYTHON_VERSION
        value: "3.11.0"
