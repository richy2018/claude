<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Watermark Removal AI</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --edge: #2b3543;
    --fg: #e6edf3; --muted: #8b98a5; --accent: #4f9dff; --accent2: #36d399;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg); color: var(--fg); min-height: 100vh;
  }
  header { padding: 28px 20px 10px; text-align: center; }
  h1 { margin: 0; font-size: 1.6rem; letter-spacing: .3px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); margin-top: 6px; font-size: .92rem; }
  main { max-width: 980px; margin: 0 auto; padding: 18px 20px 60px; }
  #drop {
    border: 2px dashed var(--edge); border-radius: 14px; padding: 46px 20px;
    text-align: center; cursor: pointer; transition: .15s; background: var(--panel);
  }
  #drop.hover { border-color: var(--accent); background: #1d2735; }
  #drop p { margin: 8px 0 0; color: var(--muted); }
  .big { font-size: 1.05rem; color: var(--fg); }
  .controls {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    margin: 18px 0; padding: 16px; background: var(--panel);
    border: 1px solid var(--edge); border-radius: 12px;
  }
  .controls label { font-size: .85rem; color: var(--muted); display: flex; flex-direction: column; gap: 6px; }
  select, input[type=range] { background: #0d1117; color: var(--fg); border: 1px solid var(--edge);
    border-radius: 8px; padding: 7px 9px; }
  button {
    background: var(--accent); color: #06101f; border: 0; border-radius: 9px;
    padding: 11px 20px; font-weight: 700; font-size: .95rem; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--edge); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .status { margin: 14px 0; min-height: 22px; color: var(--accent2); font-size: .9rem; }
  .status.err { color: #ff6b6b; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
  .card { background: var(--panel); border: 1px solid var(--edge); border-radius: 12px; overflow: hidden; }
  .card h3 { margin: 0; padding: 10px 14px; font-size: .85rem; color: var(--muted);
    border-bottom: 1px solid var(--edge); font-weight: 600; }
  .card img { display: block; width: 100%; background: #060a0f; }
  .card .foot { padding: 10px 14px; }
  a.dl { color: var(--accent); text-decoration: none; font-weight: 600; font-size: .9rem; }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Watermark <span>Removal AI</span></h1>
  <div class="sub">Detects the watermark, then inpaints it away. Runs entirely on the server &mdash; no image leaves it.</div>
</header>
<main>
  <div id="drop">
    <div class="big">Drop an image here, or click to choose</div>
    <p>PNG &middot; JPG &middot; WEBP</p>
    <input id="file" type="file" accept="image/*" hidden />
  </div>

  <div class="controls">
    <label>Inpainting
      <select id="algorithm">
        <option value="telea">Telea (fast)</option>
        <option value="ns">Navier&ndash;Stokes</option>
        <option value="lama">LaMa (deep, if installed)</option>
      </select>
    </label>
    <label>Detection
      <select id="methods">
        <option value="tophat,periodic">Auto (text + tiled)</option>
        <option value="tophat">Text / logo</option>
        <option value="periodic">Tiled / repeated</option>
        <option value="alpha">PNG transparency</option>
      </select>
    </label>
    <label>Sensitivity <span id="sval" style="color:var(--fg)">0.50</span>
      <input id="sensitivity" type="range" min="0" max="1" step="0.05" value="0.5" />
    </label>
    <div class="row" style="margin-left:auto">
      <button id="preview" class="ghost" disabled>Preview detection</button>
      <button id="run" disabled>Remove watermark</button>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div class="grid">
    <div class="card">
      <h3>Original</h3>
      <img id="imgOrig" alt="" />
    </div>
    <div class="card">
      <h3 id="outTitle">Result</h3>
      <img id="imgOut" alt="" />
      <div class="foot"><a id="dl" class="dl" download="clean.png" style="display:none">&#x2193; Download result</a></div>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const drop = $('drop'), fileInput = $('file');
let currentFile = null;

function setStatus(msg, isErr=false){ const s=$('status'); s.textContent=msg; s.className='status'+(isErr?' err':''); }

drop.addEventListener('click', () => fileInput.click());
['dragover','dragenter'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('hover'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('hover'); }));
drop.addEventListener('drop', ev => { if (ev.dataTransfer.files.length) loadFile(ev.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files.length) loadFile(fileInput.files[0]); });

$('sensitivity').addEventListener('input', e => $('sval').textContent = Number(e.target.value).toFixed(2));

function loadFile(f){
  if (!f.type.startsWith('image/')) { setStatus('Please choose an image file.', true); return; }
  currentFile = f;
  $('imgOrig').src = URL.createObjectURL(f);
  $('imgOut').removeAttribute('src');
  $('dl').style.display='none';
  $('run').disabled = false; $('preview').disabled = false;
  setStatus('Loaded ' + f.name + ' — ready.');
}

async function send(preview){
  if (!currentFile) return;
  const fd = new FormData();
  fd.append('file', currentFile);
  fd.append('algorithm', $('algorithm').value);
  fd.append('methods', $('methods').value);
  fd.append('sensitivity', $('sensitivity').value);
  fd.append('preview', preview ? 'true' : 'false');
  $('run').disabled = true; $('preview').disabled = true;
  setStatus(preview ? 'Detecting…' : 'Removing watermark…');
  try {
    const r = await fetch('/api/remove', { method:'POST', body: fd });
    if (!r.ok) { const j = await r.json().catch(()=>({detail:r.statusText})); throw new Error(j.detail||'request failed'); }
    const found = r.headers.get('X-Watermark-Found') === 'true';
    const cov = (parseFloat(r.headers.get('X-Watermark-Coverage')||'0')*100).toFixed(2);
    const method = r.headers.get('X-Watermark-Method') || 'none';
    const regions = r.headers.get('X-Watermark-Regions') || '0';
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    $('imgOut').src = url;
    $('outTitle').textContent = preview ? 'Detection preview' : 'Result';
    if (!preview) { const a=$('dl'); a.href=url; a.style.display='inline'; }
    setStatus(found
      ? `Found watermark via [${method}] — ${regions} region(s), ${cov}% of pixels.`
      : 'No watermark detected.');
  } catch (err) {
    setStatus('Error: ' + err.message, true);
  } finally {
    $('run').disabled = false; $('preview').disabled = false;
  }
}
$('run').addEventListener('click', () => send(false));
$('preview').addEventListener('click', () => send(true));
</script>
</body>
</html>
